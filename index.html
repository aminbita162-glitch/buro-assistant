<!DOCTYPE html>
<html>
<head>
  <title>Buro Assistant</title>
</head>
<body>

  <h1>🧠 Buro Assistant</h1>

  <input id="input" placeholder="Type your task..." />
  <button onclick="send()">Send</button>

  <h2>Response:</h2>
  <pre id="output"></pre>

  <h2>Search & Filters:</h2>
  <input id="searchText" placeholder="Search text..." />
  <input id="searchDeadline" placeholder="Deadline..." />
  <select id="searchPriority">
    <option value="">All priorities</option>
    <option value="high">high</option>
    <option value="medium">medium</option>
    <option value="low">low</option>
  </select>
  <button onclick="applyFilters()">Apply Filters</button>
  <button onclick="clearFilters()">Clear Filters</button>

  <h2>Tasks:</h2>
  <ul id="tasks"></ul>

  <script>
    async function send() {
      const text = document.getElementById("input").value;

      const res = await fetch("https://buro-assistant.onrender.com/assistant", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`https://buro-assistant.onrender.com/tasks/${id}`, {
        method: "DELETE"
      });

      loadTasks();
    }

    async function editTask(id) {
      const text = prompt("Enter update instruction for this task:");

      if (!text) {
        return;
      }

      const res = await fetch(`https://buro-assistant.onrender.com/tasks/${id}/ai-update`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      loadTasks();
    }

    async function loadTasks(url = "https://buro-assistant.onrender.com/tasks") {
      const res = await fetch(url);
      const data = await res.json();

      const list = document.getElementById("tasks");
      list.innerHTML = "";

      data.tasks.forEach(task => {
        const li = document.createElement("li");

        const text = document.createElement("span");
        text.innerText = `${task.id} - ${task.title} (${task.deadline}) [${task.priority}]`;

        const editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.onclick = () => editTask(task.id);

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";
        deleteBtn.onclick = () => deleteTask(task.id);

        li.appendChild(text);
        li.appendChild(document.createTextNode(" "));
        li.appendChild(editBtn);
        li.appendChild(document.createTextNode(" "));
        li.appendChild(deleteBtn);

        list.appendChild(li);
      });
    }

    function applyFilters() {
      const q = document.getElementById("searchText").value;
      const deadline = document.getElementById("searchDeadline").value;
      const priority = document.getElementById("searchPriority").value;

      const params = new URLSearchParams();

      if (q) params.append("q", q);
      if (deadline) params.append("deadline", deadline);
      if (priority) params.append("priority", priority);

      const url = `https://buro-assistant.onrender.com/tasks/search?${params.toString()}`;
      loadTasks(url);
    }

    function clearFilters() {
      document.getElementById("searchText").value = "";
      document.getElementById("searchDeadline").value = "";
      document.getElementById("searchPriority").value = "";
      loadTasks();
    }

    loadTasks();
  </script>

</body>
</html>
