<!DOCTYPE html>
<html>
<head>
  <title>Buro Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 22px;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input,
    select,
    button,
    textarea {
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 12px 14px;
    }

    input,
    select {
      background: #ffffff;
      min-width: 180px;
      flex: 1;
    }

    button {
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary-btn {
      background: #6b7280;
    }

    .edit-btn {
      background: #f59e0b;
      color: white;
      padding: 8px 12px;
      font-size: 14px;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 8px 12px;
      font-size: 14px;
    }

    .auth-btn {
      min-width: 140px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #111827;
      color: #f9fafb;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      min-height: 80px;
    }

    #tasks {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 12px;
      background: #f9fafb;
      flex-wrap: wrap;
    }

    .task-text {
      font-size: 16px;
      line-height: 1.5;
      flex: 1;
      min-width: 220px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-left: 6px;
    }

    .priority-high {
      background: #fee2e2;
      color: #b91c1c;
    }

    .priority-medium {
      background: #fef3c7;
      color: #92400e;
    }

    .priority-low {
      background: #dcfce7;
      color: #166534;
    }

    .section-title {
      margin-bottom: 12px;
    }

    .status-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
      display: block;
      min-height: 48px;
      border: 1px solid transparent;
    }

    .status-neutral {
      background: #f3f4f6;
      color: #374151;
      border-color: #e5e7eb;
    }

    .status-loading {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #93c5fd;
    }

    .status-success {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }

    .status-error {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fca5a5;
    }

    .empty-state {
      padding: 16px;
      border-radius: 12px;
      background: #f3f4f6;
      color: #6b7280;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .auth-box {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      background: #f9fafb;
    }

    .user-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      display: none;
    }

    .user-box.active {
      display: block;
    }

    .muted-text {
      color: #6b7280;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 14px;
      }

      h1 {
        font-size: 26px;
      }

      .task-item {
        align-items: flex-start;
      }

      .task-actions {
        width: 100%;
      }

      .task-actions button {
        flex: 1;
      }

      .auth-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card" id="topCard">
      <h1>🧠 Buro Assistant</h1>
      <div class="row">
        <input id="input" placeholder="Type your task..." />
        <button onclick="send()">Send</button>
      </div>
      <div id="statusBox" class="status-box status-neutral">Ready</div>
    </div>

    <div class="card">
      <h2 class="section-title">Account</h2>

      <div class="auth-grid">
        <div class="auth-box">
          <h3>Sign Up</h3>
          <div class="row">
            <input id="signupName" placeholder="Name" />
            <input id="signupEmail" placeholder="Email" />
            <input id="signupPassword" type="password" placeholder="Password" />
            <button class="auth-btn" onclick="signup()">Create Account</button>
          </div>
        </div>

        <div class="auth-box">
          <h3>Login</h3>
          <div class="row">
            <input id="loginEmail" placeholder="Email" />
            <input id="loginPassword" type="password" placeholder="Password" />
            <button class="auth-btn" onclick="login()">Login</button>
            <button class="secondary-btn auth-btn" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>

      <div id="userBox" class="user-box"></div>
      <div class="muted-text">
        When you are logged in, task requests will be sent with your token and only your tasks will be loaded.
      </div>
    </div>

    <div class="card" id="responseCard">
      <h2 class="section-title">Response</h2>
      <pre id="output"></pre>
    </div>

    <div class="card">
      <h2 class="section-title">Search & Filters</h2>
      <div class="row">
        <input id="searchText" placeholder="Search text..." />
        <input id="searchDeadline" placeholder="Deadline..." />
        <select id="searchPriority">
          <option value="">All priorities</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
        </select>
        <button onclick="applyFilters()">Apply Filters</button>
        <button class="secondary-btn" onclick="clearFilters()">Clear Filters</button>
      </div>
    </div>

    <div class="card" id="tasksCard">
      <h2 class="section-title">Tasks</h2>
      <ul id="tasks"></ul>
    </div>

  </div>

  <script>
    const API_BASE = "https://buro-assistant.onrender.com";

    function buildApiUrl(path, params = null) {
      const url = new URL(path, API_BASE);

      if (params) {
        Object.entries(params).forEach(([key, value]) => {
          if (value !== undefined && value !== null && String(value).trim() !== "") {
            url.searchParams.set(key, String(value).trim());
          }
        });
      }

      return url.toString();
    }

    function getToken() {
      return localStorage.getItem("buro_token") || "";
    }

    function getStoredUser() {
      const raw = localStorage.getItem("buro_user");
      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (error) {
        return null;
      }
    }

    function setAuthData(token, user) {
      localStorage.setItem("buro_token", token);
      localStorage.setItem("buro_user", JSON.stringify(user));
    }

    function clearAuthData() {
      localStorage.removeItem("buro_token");
      localStorage.removeItem("buro_user");
    }

    function buildHeaders(includeJson = false) {
      const headers = {};

      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }

      const token = getToken();
      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

    function showStatus(message, type) {
      const box = document.getElementById("statusBox");
      box.className = "status-box";
      box.classList.add(`status-${type}`);
      box.innerText = message;
    }

    function clearStatus() {
      const box = document.getElementById("statusBox");
      box.className = "status-box status-neutral";
      box.innerText = "Ready";
    }

    function scrollToTopArea() {
      const topCard = document.getElementById("topCard");
      if (topCard) {
        topCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function scrollToResponse() {
      const responseCard = document.getElementById("responseCard");
      if (responseCard) {
        responseCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function scrollToTasks() {
      const tasksCard = document.getElementById("tasksCard");
      if (tasksCard) {
        tasksCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function renderUserBox() {
      const user = getStoredUser();
      const token = getToken();
      const box = document.getElementById("userBox");

      if (user && token) {
        box.className = "user-box active";
        box.innerText = `Logged in as ${user.name} (${user.email})`;
      } else {
        box.className = "user-box";
        box.innerText = "";
      }
    }

    function formatTaskLine(task) {
      return `#${task.id} - ${task.title} | Deadline: ${task.deadline} | Priority: ${task.priority}`;
    }

    function formatResponse(data) {
      if (!data) {
        return "No response received.";
      }

      if (data.action === "clarify") {
        return `Clarification needed:\n${data.message || "Please clarify your request."}`;
      }

      if (data.action === "create" && data.task) {
        return `Task created successfully.\n${formatTaskLine(data.task)}`;
      }

      if (data.action === "update" && data.task) {
        return `Task updated successfully.\n${formatTaskLine(data.task)}`;
      }

      if (data.action === "delete" && data.task) {
        return `Task deleted successfully.\n${formatTaskLine(data.task)}`;
      }

      if (data.deleted_task) {
        return `Task deleted successfully.\n${formatTaskLine(data.deleted_task)}`;
      }

      if (data.user && data.message && data.token) {
        return `${data.message}\nUser: ${data.user.name} (${data.user.email})\nToken saved successfully.`;
      }

      if (data.user && data.message) {
        return `${data.message}\nUser: ${data.user.name} (${data.user.email})`;
      }

      if (data.task) {
        return `${data.message || "Task processed successfully."}\n${formatTaskLine(data.task)}`;
      }

      if (data.results && Array.isArray(data.results)) {
        const lines = data.results.map(item => {
          if (item.task) {
            return `${item.action.toUpperCase()}: ${formatTaskLine(item.task)}`;
          }
          return `${item.action.toUpperCase()}: completed`;
        });

        return `${data.message || "Multiple actions completed successfully."}\n\n${lines.join("\n")}`;
      }

      if (data.created_tasks && Array.isArray(data.created_tasks)) {
        const lines = data.created_tasks.map(task => formatTaskLine(task));
        return `${data.summary || "Email analyzed successfully."}\n\n${lines.join("\n")}`;
      }

      if (data.message) {
        return data.message;
      }

      return JSON.stringify(data, null, 2);
    }

    async function signup() {
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!name || !email || !password) {
        showStatus("Please complete all signup fields.", "error");
        scrollToTopArea();
        return;
      }

      try {
        showStatus("Creating account...", "loading");
        scrollToTopArea();

        const res = await fetch(buildApiUrl("/auth/signup"), {
          method: "POST",
          headers: buildHeaders(true),
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();
        document.getElementById("output").innerText = formatResponse(data);

        if (!res.ok) {
          showStatus(data.detail || "Signup failed.", "error");
          scrollToResponse();
          return;
        }

        showStatus("Account created successfully.", "success");
        document.getElementById("signupName").value = "";
        document.getElementById("signupEmail").value = "";
        document.getElementById("signupPassword").value = "";
        scrollToTopArea();
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Network or server error during signup.", "error");
        scrollToResponse();
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        showStatus("Please enter email and password.", "error");
        scrollToTopArea();
        return;
      }

      try {
        showStatus("Logging in...", "loading");
        scrollToTopArea();

        const res = await fetch(buildApiUrl("/auth/login"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        document.getElementById("output").innerText = formatResponse(data);

        if (!res.ok) {
          showStatus(data.detail || "Login failed.", "error");
          scrollToResponse();
          return;
        }

        setAuthData(data.token, data.user);
        renderUserBox();
        showStatus("Login successful.", "success");
        document.getElementById("loginPassword").value = "";
        await loadTasks();
        scrollToTopArea();
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Network or server error during login.", "error");
        scrollToResponse();
      }
    }

    function logout() {
      clearAuthData();
      renderUserBox();
      document.getElementById("output").innerText = "Logged out successfully.";
      showStatus("Logged out successfully.", "success");
      loadTasks();
      scrollToTopArea();
    }

    async function send() {
      const text = document.getElementById("input").value;

      if (!text.trim()) {
        showStatus("Please enter a task instruction.", "error");
        scrollToTopArea();
        return;
      }

      try {
        showStatus("Sending request...", "loading");
        scrollToTopArea();

        const res = await fetch(buildApiUrl("/assistant"), {
          method: "POST",
          headers: buildHeaders(true),
          body: JSON.stringify({ text })
        });

        const data = await res.json();
        document.getElementById("output").innerText = formatResponse(data);

        if (!res.ok) {
          showStatus(data.detail || "Request failed.", "error");
          scrollToResponse();
          return;
        }

        showStatus("Task request completed successfully.", "success");
        document.getElementById("input").value = "";
        await loadTasks();
        scrollToTopArea();
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Network or server error.", "error");
        scrollToResponse();
      }
    }

    async function deleteTask(id) {
      try {
        showStatus("Deleting task...", "loading");
        scrollToTopArea();

        const res = await fetch(buildApiUrl(`/tasks/${id}`), {
          method: "DELETE",
          headers: buildHeaders()
        });

        const data = await res.json();
        document.getElementById("output").innerText = formatResponse(data);

        if (!res.ok) {
          showStatus(data.detail || "Delete failed.", "error");
          scrollToResponse();
          return;
        }

        showStatus("Task deleted successfully.", "success");
        await loadTasks();
        scrollToTopArea();
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Network or server error while deleting.", "error");
        scrollToResponse();
      }
    }

    async function editTask(id) {
      const text = prompt("Enter update instruction for this task:");

      if (!text) {
        return;
      }

      try {
        showStatus("Updating task...", "loading");
        scrollToTopArea();

        const res = await fetch(buildApiUrl(`/tasks/${id}/ai-update`), {
          method: "POST",
          headers: buildHeaders(true),
          body: JSON.stringify({ text })
        });

        const data = await res.json();
        document.getElementById("output").innerText = formatResponse(data);

        if (!res.ok) {
          showStatus(data.detail || "Update failed.", "error");
          scrollToResponse();
          return;
        }

        showStatus("Task updated successfully.", "success");
        await loadTasks();
        scrollToTopArea();
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Network or server error while updating.", "error");
        scrollToResponse();
      }
    }

    function getPriorityClass(priority) {
      if (priority === "high") return "priority-high";
      if (priority === "medium") return "priority-medium";
      if (priority === "low") return "priority-low";
      return "";
    }

    async function loadTasks(params = null) {
      try {
        const res = await fetch(buildApiUrl("/tasks/search", params || {}), {
          headers: buildHeaders()
        });

        const data = await res.json();

        const list = document.getElementById("tasks");
        list.innerHTML = "";

        if (!data.tasks || data.tasks.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerText = "No tasks found.";
          list.appendChild(empty);
          return;
        }

        data.tasks.forEach(task => {
          const li = document.createElement("li");
          li.className = "task-item";

          const text = document.createElement("div");
          text.className = "task-text";

          const badgeClass = getPriorityClass(task.priority);
          text.innerHTML = `
            <strong>#${task.id}</strong> - ${task.title}<br>
            Deadline: ${task.deadline}
            <span class="badge ${badgeClass}">${task.priority}</span>
          `;

          const actions = document.createElement("div");
          actions.className = "task-actions";

          const editBtn = document.createElement("button");
          editBtn.className = "edit-btn";
          editBtn.innerText = "Edit";
          editBtn.onclick = () => editTask(task.id);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-btn";
          deleteBtn.innerText = "Delete";
          deleteBtn.onclick = () => deleteTask(task.id);

          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);

          li.appendChild(text);
          li.appendChild(actions);

          list.appendChild(li);
        });
      } catch (error) {
        document.getElementById("output").innerText = String(error);
        showStatus("Failed to load tasks.", "error");
        scrollToResponse();
      }
    }

    async function applyFilters() {
      const params = {
        q: document.getElementById("searchText").value,
        deadline: document.getElementById("searchDeadline").value,
        priority: document.getElementById("searchPriority").value
      };

      await loadTasks(params);
      showStatus("Filters applied.", "success");
      scrollToTasks();
    }

    async function clearFilters() {
      document.getElementById("searchText").value = "";
      document.getElementById("searchDeadline").value = "";
      document.getElementById("searchPriority").value = "";
      await loadTasks();
      showStatus("Filters cleared.", "success");
      scrollToTasks();
    }

    renderUserBox();
    loadTasks();
  </script>
</body>
</html>
